<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: transparent; }
#btn {
  display: block;
  width: 100%;
  padding: 10px 16px;
  background: #FF4B4B;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
#btn:active { opacity: 0.85; }
#btn:disabled { background: #999; cursor: default; }
#msg {
  margin-top: 6px;
  font-size: 12px;
  color: #555;
  text-align: center;
  min-height: 16px;
}
</style>
</head>
<body>
<button id="btn" onclick="requestGeo()">📍 Rileva posizione</button>
<div id="msg"></div>
<script>
(function () {
  var sent = false;
  var btn = document.getElementById("btn");
  var msg = document.getElementById("msg");

  function setHeight() {
    var h = document.body.scrollHeight || 64;
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setFrameHeight",
      height: h
    }, "*");
  }

  function send(value) {
    if (sent) return;
    sent = true;
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setComponentValue",
      value: value,
      dataType: "json"
    }, "*");
  }

  var geoOpts = { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 };

  window.requestGeo = function () {
    btn.disabled = true;
    msg.textContent = "Rilevamento in corso…";

    // Call navigator.geolocation directly in THIS iframe.
    // Streamlit 1.24+ includes geolocation in the iframe allow attribute,
    // so this call is permitted. The button click is a genuine user gesture,
    // which satisfies iOS Safari's requirement to show the permission dialog.
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function (p) {
          send({ lat: p.coords.latitude, lon: p.coords.longitude });
        },
        function (e) {
          send({ error: e.code });
        },
        geoOpts
      );
    } else {
      // Geolocation API not available in this iframe — try parent injection.
      tryParentInjection();
    }
  };

  // Fallback: inject a script into the parent page (same-origin).
  // Used only when navigator.geolocation is unavailable in this iframe.
  function tryParentInjection() {
    try {
      var script = window.parent.document.createElement("script");
      script.textContent = [
        "(function() {",
        "  if (window.__geoInProgress) return;",
        "  window.__geoInProgress = true;",
        "  window.__geoResult = undefined;",
        "  if (!navigator.geolocation) { window.__geoResult = {error: 2}; return; }",
        "  navigator.geolocation.getCurrentPosition(",
        "    function(p) { window.__geoResult = {lat: p.coords.latitude, lon: p.coords.longitude}; },",
        "    function(e) { window.__geoResult = {error: e.code}; },",
        "    {enableHighAccuracy: true, timeout: 12000, maximumAge: 60000}",
        "  );",
        "})()"
      ].join("\n");
      window.parent.document.head.appendChild(script);
    } catch (e) {
      send({ error: 99 });
      return;
    }
    var attempts = 0;
    var poll = setInterval(function () {
      attempts++;
      var r = window.parent.__geoResult;
      if (r !== undefined) {
        clearInterval(poll);
        window.parent.__geoInProgress = false;
        window.parent.__geoResult = undefined;
        send(r);
      } else if (attempts > 70) {
        clearInterval(poll);
        window.parent.__geoInProgress = false;
        send({ error: 3 });
      }
    }, 200);
  }

  // Signal ready to Streamlit.
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:componentReady",
    apiVersion: 1
  }, "*");

  window.addEventListener("load", setHeight);
  setTimeout(setHeight, 100);
}());
</script>
</body>
</html>
