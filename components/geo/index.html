<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;padding:0;height:0;overflow:hidden}</style></head>
<body>
<script>
(function () {
  var sent = false;

  function send(value) {
    if (sent) return;
    sent = true;
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setComponentValue",
      value: value,
      dataType: "json"
    }, "*");
  }

  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:componentReady",
    apiVersion: 1
  }, "*");

  window.addEventListener("message", function (evt) {
    if (evt.data.type !== "streamlit:render") return;

    // Inject into the parent page context so Safari's Permissions Policy
    // doesn't block geolocation (iframe restriction does not apply there).
    try {
      var script = window.parent.document.createElement("script");
      script.id = "__geoScript";
      script.textContent = [
        "(function() {",
        "  if (window.__geoInProgress) return;",
        "  window.__geoInProgress = true;",
        "  window.__geoResult = undefined;",
        "  if (!navigator.geolocation) { window.__geoResult = {error: 2}; return; }",
        "  navigator.geolocation.getCurrentPosition(",
        "    function(p) { window.__geoResult = {lat: p.coords.latitude, lon: p.coords.longitude}; },",
        "    function(e) { window.__geoResult = {error: e.code}; },",
        "    {enableHighAccuracy: true, timeout: 10000, maximumAge: 60000}",
        "  );",
        "})()"
      ].join("\n");
      window.parent.document.head.appendChild(script);
    } catch (e) {
      send({ error: 99 });
      return;
    }

    // Poll parent window for result (max 12 s).
    var attempts = 0;
    var poll = setInterval(function () {
      attempts++;
      var r = window.parent.__geoResult;
      if (r !== undefined) {
        clearInterval(poll);
        window.parent.__geoInProgress = false;
        window.parent.__geoResult = undefined;
        send(r);
      } else if (attempts > 60) {
        clearInterval(poll);
        window.parent.__geoInProgress = false;
        send({ error: 3 });
      }
    }, 200);
  });
}());
</script>
</body>
</html>
