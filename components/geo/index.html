<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: transparent; }
#btn {
  display: block;
  width: 100%;
  padding: 10px 16px;
  background: #FF4B4B;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#btn:active { opacity: 0.8; }
#btn:disabled { background: #aaa; cursor: default; }
#msg {
  margin-top: 7px;
  font-size: 12px;
  color: #555;
  text-align: center;
  min-height: 16px;
}
</style>
</head>
<body>
<button id="btn">📍 Rileva posizione</button>
<div id="msg"></div>
<script>
(function () {
  var sent = false;
  var btn = document.getElementById("btn");
  var msg = document.getElementById("msg");

  /* ---- Streamlit messaging ---- */
  function sendHeight() {
    var h = Math.max(document.body.scrollHeight, 64);
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h },
      "*"
    );
  }

  function sendValue(value) {
    if (sent) return;
    sent = true;
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value, dataType: "json" },
      "*"
    );
  }

  /* ---- Geolocation ---- */
  var geoOpts = { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 };

  function onSuccess(p) {
    sendValue({ lat: p.coords.latitude, lon: p.coords.longitude });
  }

  function onError(e) {
    msg.textContent = "";
    btn.disabled = false;
    btn.textContent = "📍 Rileva posizione";
    sendValue({ error: e.code });
  }

  btn.addEventListener("click", function () {
    btn.disabled = true;
    btn.textContent = "⏳ Rilevamento…";
    msg.textContent = "Attendere…";

    try {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(onSuccess, onError, geoOpts);
      } else {
        sendValue({ error: 2 });
      }
    } catch (e) {
      sendValue({ error: 99 });
    }
  });

  /* ---- Streamlit component protocol ---- */
  window.addEventListener("message", function (evt) {
    if (!evt.data || !evt.data.isStreamlitMessage) return;
    if (evt.data.type === "streamlit:render") {
      sendHeight();
    }
  });

  /* Signal ready, then report height. */
  window.parent.postMessage(
    { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
    "*"
  );
  window.addEventListener("load", sendHeight);
  setTimeout(sendHeight, 50);
}());
</script>
</body>
</html>
